name: weather-agent

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade openai

      - name: Run
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: python main.py
